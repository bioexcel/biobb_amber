name: PR Tests

# Trigger the workflow on pull request events
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr_test:
    strategy:
      matrix:
        os: [mmbswarm]
        python-version: ["3.10"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: echo "Repository -> ${{ github.repository }}"
      - run: echo "Branch -> ${{ github.ref }}"
      - run: echo "Trigger event -> ${{ github.event_name }}"
      - run: echo "Runner OS -> ${{ runner.os }}"

      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}

      - name: Detect changed files and set test paths
        id: changes
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
          echo "Changed files:"
          echo "${CHANGED_FILES:-(none)}"

          TESTS=""
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            if [[ "$FILE" =~ ^biobb_amber/test/unitests/test_[^/]+/test_[^/]+\.py$ ]]; then
              # Direct test file change – run only this file (skip container/docker/singularity tests)
              if [[ "$FILE" != *_container.py && "$FILE" != *_docker.py && "$FILE" != *_singularity.py ]]; then
                [ -f "$FILE" ] && TESTS+=$'\n'"$FILE"
              fi
            elif [[ "$FILE" =~ ^biobb_amber/([a-z][^/]+)/([^/]+)\.py$ ]]; then
              TOOL="${BASH_REMATCH[1]}"
              BASE="${BASH_REMATCH[2]}"
              if [[ "$BASE" == "__init__" || "$BASE" == "common" ]]; then
                # Run all tests for this tool
                TEST_DIR="biobb_amber/test/unitests/test_${TOOL}"
                [ -d "$TEST_DIR" ] && TESTS+=$'\n'"$TEST_DIR"
              else
                # Run the matching test file for this source file
                TEST_FILE="biobb_amber/test/unitests/test_${TOOL}/test_${BASE}.py"
                if [ -f "$TEST_FILE" ]; then
                  TESTS+=$'\n'"$TEST_FILE"
                else
                  TEST_DIR="biobb_amber/test/unitests/test_${TOOL}"
                  [ -d "$TEST_DIR" ] && TESTS+=$'\n'"$TEST_DIR"
                fi
              fi
            fi
          done <<< "$CHANGED_FILES"

          TESTS=$(echo "$TESTS" | grep -v '^$' | sort -u | tr '\n' ' ' | xargs || echo "")
          echo "Test paths: ${TESTS:-(none detected – will run full suite)}"
          echo "test_paths=$TESTS" >> "$GITHUB_OUTPUT"

      - name: Remove all micromamba installations
        run: |
          rm -rf $HOME/.bash_profile $HOME/.conda $HOME/micromamba $HOME/micromamba-bin 2>/dev/null
          touch $HOME/.bash_profile

      - name: setup-micromamba
        uses: mamba-org/setup-micromamba@v2.0.0
        with:
          generate-run-shell: true
          micromamba-version: '2.0.2-2'
          post-cleanup: 'all'
          init-shell: bash
          environment-file: .github/env.yaml
          create-args: >-
            python=${{ matrix.python-version }}
            pytest
            pytest-cov
            pytest-html
            flake8
            pip

      - name: List installed package versions
        shell: bash -l {0}
        run: micromamba list

      - name: Checkout biobb_common
        uses: actions/checkout@v4
        with:
          repository: bioexcel/biobb_common
          path: './biobb_common'

      - name: Run tests
        shell: bash -l {0}
        run: |
          # Ignoring docker and singularity tests
          export PYTHONPATH=.:./biobb_common:$PYTHONPATH

          # Create directory for tests reports
          mkdir -p ./reports/junit

          # Run only tests for modified tools, fall back to full suite when nothing specific detected
          TEST_PATHS="${{ steps.changes.outputs.test_paths }}"
          if [ -z "$TEST_PATHS" ]; then
            TEST_PATHS="biobb_amber/test/unitests/"
          fi

          pytest $TEST_PATHS --ignore-glob=*container.py --ignore-glob=*docker.py --ignore-glob=*singularity.py

      # Notify user about test results
