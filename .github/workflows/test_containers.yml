name: tests containers

on:
  # workflow_dispatch
  push:
    branches: [ master ]
    paths-ignore:
      - '.gitignore'
      - '.readthedocs.yaml'
      - 'LICENSE'
      - 'setup.py'
      - 'README.md'
      - 'CITATION.cff'
      - 'references.jsonld'
      - '**/docs/**'
      - '**/json_schemas/**'
      - '.github/workflows/linting_and_testing.yml'

jobs:
  # Name of the Job
  test_containers:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - run: echo "Repository -> ${{ github.repository }}"
      - run: echo "Branch -> ${{ github.ref }}"
      - run: echo "Trigger event -> ${{ github.event_name }}"
      - run: echo "Runner OS -> ${{ runner.os }}"


      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}

      - name: Remove all micromamba installations
        run: |
          rm -rf $HOME/.bash_profile $HOME/.conda $HOME/micromamba $HOME/micromamba-bin 2>/dev/null
          touch $HOME/.bash_profile

      - name: Install Singularity (via Apptainer)
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          singularity --version

      - name: setup-micromamba
        uses: mamba-org/setup-micromamba@v2.0.0
        with:
          generate-run-shell: true
          micromamba-version: '2.0.2-2'
          post-cleanup: 'all'
          init-shell: bash
          environment-name: test-env
          create-args: >-
            python=${{ matrix.python-version }}
            pytest
            pytest-cov
            pytest-html

      - name: Test Singularity with a simple container
        run: |
          singularity exec docker://alpine:latest echo "Singularity is working"

      - name: List installed package versions
        shell: bash -l {0}
        run: micromamba list

      - name: Checkout biobb_common
        uses: actions/checkout@v4
        with:
          repository: bioexcel/biobb_common
          path: './biobb_common'

      - name: Install ${{ github.event.repository.name }}
        shell: bash -l {0}
        run: |
          export PYTHONPATH=.:./biobb_common:$PYTHONPATH
          pip install -e .

      - name: Pre-pull ${{ github.event.repository.name }} Singularity image
        run: |
          mkdir -p $HOME/.singularity_cache
          cd $HOME/.singularity_cache
          singularity pull --name ${{ github.event.repository.name }}:5.2.sif https://depot.galaxyproject.org/singularity/${{ github.event.repository.name }}:5.2.1--py312hc5e4ab4_0
          ls -lh ${{ github.event.repository.name }}:5.2.sif

      - name: Run container tests
        shell: bash -l {0}
        run: |
          export PYTHONPATH=.:./biobb_common:$PYTHONPATH
          pytest ${{ github.event.repository.name }}/test/unitests/ -k "container" --ignore-glob=*nab_build* -v 


