name: tests containers

on:
  # workflow_dispatch
  push:
    branches: [ master ]
    paths-ignore:
      - '.gitignore'
      - '.readthedocs.yaml'
      - 'LICENSE'
      - 'setup.py'
      - 'README.md'
      - 'CITATION.cff'
      - 'references.jsonld'
      - '**/docs/**'
      - '**/json_schemas/**'
      - '.github/workflows/linting_and_testing.yml'

jobs:
  # Name of the Job
  test_containers:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: echo "Repository -> ${{ github.repository }}"
      - run: echo "Branch -> ${{ github.ref }}"
      - run: echo "Trigger event -> ${{ github.event_name }}"
      - run: echo "Runner OS -> ${{ runner.os }}"


      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}

      - name: Detect changed files and set test paths
        id: changes
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "New branch detected – running full container test suite"
            echo "test_paths=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || echo "")
          echo "Changed files:"
          echo "${CHANGED_FILES:-(none)}"

          TESTS=""
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            if [[ "$FILE" =~ ^biobb_amber/test/unitests/test_[^/]+/test_[^/]+_container\.py$ ]]; then
              # Direct container test file change – run only this file
              [ -f "$FILE" ] && TESTS+=$'\n'"$FILE"
            elif [[ "$FILE" =~ ^biobb_amber/test/unitests/test_[^/]+/test_[^/]+\.py$ ]]; then
              # Non-container test file change – not relevant for this workflow
              :
            elif [[ "$FILE" =~ ^biobb_amber/([a-z][^/]+)/([^/]+)\.py$ ]]; then
              TOOL="${BASH_REMATCH[1]}"
              BASE="${BASH_REMATCH[2]}"
              if [[ "$BASE" == "__init__" || "$BASE" == "common" ]]; then
                # Run all container tests for this tool
                TEST_DIR="biobb_amber/test/unitests/test_${TOOL}"
                [ -d "$TEST_DIR" ] && TESTS+=$'\n'"$TEST_DIR"
              else
                # Run the matching container test file for this source file
                TEST_FILE="biobb_amber/test/unitests/test_${TOOL}/test_${BASE}_container.py"
                if [ -f "$TEST_FILE" ]; then
                  TESTS+=$'\n'"$TEST_FILE"
                else
                  TEST_DIR="biobb_amber/test/unitests/test_${TOOL}"
                  [ -d "$TEST_DIR" ] && TESTS+=$'\n'"$TEST_DIR"
                fi
              fi
            fi
          done <<< "$CHANGED_FILES"

          TESTS=$(echo "$TESTS" | grep -v '^$' | sort -u | tr '\n' ' ' | xargs || echo "")
          echo "Test paths: ${TESTS:-(none detected – will run full container suite)}"
          echo "test_paths=$TESTS" >> "$GITHUB_OUTPUT"

      - name: Remove all micromamba installations
        run: |
          rm -rf $HOME/.bash_profile $HOME/.conda $HOME/micromamba $HOME/micromamba-bin 2>/dev/null
          touch $HOME/.bash_profile

      - name: Install Singularity (via Apptainer)
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          singularity --version

      - name: Get biobb_common version from env.yaml
        id: biobb_common_version
        run: |
          VERSION=$(grep 'biobb_common' .github/env.yaml | sed 's/.*biobb_common *//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: setup-micromamba
        uses: mamba-org/setup-micromamba@v2.0.0
        with:
          generate-run-shell: true
          micromamba-version: '2.0.2-2'
          post-cleanup: 'all'
          init-shell: bash
          environment-name: test-env
          condarc: |
            channels:
              - bioconda
              - conda-forge
          create-args: >-
            python=${{ matrix.python-version }}
            pytest
            pytest-cov
            pytest-html
            biobb_common${{ steps.biobb_common_version.outputs.version }}

      - name: List installed package versions
        shell: bash -l {0}
        run: micromamba list

      - name: Pre-pull ${{ github.event.repository.name }} Singularity image
        run: |
          SINGULARITY_URL=$(jq -r '.singularity' ${{ github.workspace }}/${{ github.event.repository.name }}/json_schemas/${{ github.event.repository.name }}.json)
          VERSION=$(jq -r '.version' ${{ github.workspace }}/${{ github.event.repository.name }}/json_schemas/${{ github.event.repository.name }}.json)
          mkdir -p $HOME/.singularity_cache
          cd $HOME/.singularity_cache
          singularity pull --name ${{ github.event.repository.name }}:${VERSION}.sif ${SINGULARITY_URL}
          ls -lh ${{ github.event.repository.name }}:${VERSION}.sif

      - name: Run container tests
        shell: bash -l {0}
        run: |
          export PYTHONPATH=.:$PYTHONPATH

          # Run only tests for modified tools, fall back to full container suite when nothing specific detected
          TEST_PATHS="${{ steps.changes.outputs.test_paths }}"
          if [ -z "$TEST_PATHS" ]; then
            TEST_PATHS="${{ github.event.repository.name }}/test/unitests/"
          fi

          pytest $TEST_PATHS -k "container" --ignore-glob=*nab_build* -v


